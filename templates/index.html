<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastrointestinal Disease Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="page-container">
        <div class="left-column">
            <div id="loader-3d">Loading 3D Model...</div>
            <canvas id="3d-canvas"></canvas>
        </div>
        
        <div class="right-column">
            <div class="container" id="report-container">
                <header>
                    <h1>Gastrointestinal Disease Classifier</h1>
                    <p>Upload endoscopic imagery for analysis.</p>
                </header>

                <main>
                    <div class="model-select-container" style="margin-bottom: 20px; text-align: left;">
                        <label for="model-selector" style="font-weight: 700; color: var(--dark-color); display: block; margin-bottom: 8px;">Select Model:</label>
                        <select id="model-selector" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 1rem; background: #fff; cursor: pointer; color: var(--text-color);">
                            <option value="cnn" selected>Custom CNN </option>
                            <option value="swin">Swin Transformer </option>
                            <option value="resnet">ResNet50 </option>
                        </select>
                    </div>

                    <div class="card">
                        <div class="upload-area" id="upload-area">
                            <input type="file" id="file-input" accept="image/*" style="display: none;">
                            <label for="file-input" class="upload-label">
                                <img src="https://placehold.co/100x100/f0eaf7/8E44AD?text=Upload" alt="Upload Icon" id="upload-icon" class="upload-icon">
                                <p id="upload-text">Click to select image</p>
                            </label>
                        </div>
                        <div id="image-preview-container" style="display: none;">
                            <img id="image-preview" src="#" alt="Preview">
                            <button id="remove-image-btn">×</button>
                        </div>
                        <button id="predict-btn" class="predict-btn" disabled>Analyze Image</button>
                    </div>

                    <div id="loader" class="loader" style="display: none;"></div>
                    <div id="error-container" class="error-container" style="display: none;"></div>

                    <div id="results-wrapper" style="display: none;">
                        <div id="result-container" class="result-container">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <div>
                                    <h2>Diagnosis</h2>
                                    <p><strong>Prediction:</strong> <span id="result-prediction" style="color: var(--primary-color); font-size: 1.2rem;"></span></p>
                                    <p><strong>Confidence:</strong> <span id="result-confidence"></span></p>
                                </div>
                                <div style="text-align: right; background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 0.85rem; border: 1px solid #ddd;">
                                    <p style="margin:0; font-weight:bold; color:#555;">Model Info</p>
                                    <p style="margin:5px 0 0 0;" id="model-used-display">--</p>
                                    <p style="margin:0; color:#888;" id="inf-time">--</p>
                                </div>
                            </div>
                            <div style="display: flex; gap: 10px; margin-top: 15px;">
                                <button id="view-3d-btn" class="view-3d-btn" style="display: none; flex: 1;">View in 3D Stomach Model</button>
                                <button id="download-pdf-btn" class="view-3d-btn" style="display: none; flex: 1; background-color: #27ae60;">📄 Download PDF Report</button>
                            </div>
                        </div>

                        <div class="result-container">
                            <h2>Analysis image</h2>
                            <div class="xai-tabs" style="display: flex; gap: 8px; margin-bottom: 10px;">
                                <button class="pdf_download xai-tab active" onclick="switchXaiTab('gradcam')">Grad-CAM</button>
                                <button class="pdf_download xai-tab" onclick="switchXaiTab('lime')">LIME</button>
                                <button class="pdf_download xai-tab" onclick="switchXaiTab('shap')">SHAP</button>
                            </div>
                            
                            <div class="xai-viewer" style="position: relative; height: 300px; background: #f0f0f0; border-radius:8px; overflow:hidden; display:flex; justify-content:center; align-items:center;">
                                <img id="xai-result-img" src="" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                            </div>
                            
                            <p id="shap-warning" style="display:none; color: #e67e22; font-size: 0.8rem; margin-top: 5px; text-align:center;">Visualization generation failed.</p>
                        </div>

                        <div id="all-results-container" class="result-container">
                            <h2>Prediction Breakdown</h2>
                            <ul id="all-results-list" class="prediction-barchart"></ul>
                        </div>
                    </div>
                </main>
                <footer><p>Gastrointestinal Disease Classifier </p></footer>
            </div>
        </div>
    </div>
    
    <a href="https://www.google.com/maps/search/gastrointestinal+hospital+near+me" target="_blank"
   style="position: fixed; 
          bottom: 30px; 
          left: 30px; 
          width: 65px; 
          height: 65px; 
          background: rgba(255, 255, 255, 0.3); 
          backdrop-filter: blur(10px); 
          -webkit-backdrop-filter: blur(10px); 
          border: 1px solid rgba(255, 255, 255, 0.5); 
          border-radius: 50%; 
          display: flex; 
          justify-content: center; 
          align-items: center; 
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); 
          z-index: 1000; 
          transition: all 0.3s ease;
          text-decoration: none;"
   onmouseover="this.style.transform='scale(1.1)'; this.style.background='rgba(255, 255, 255, 0.5)';"
   onmouseout="this.style.transform='scale(1)'; this.style.background='rgba(255, 255, 255, 0.3)';"
   title="Find Nearest GI Hospital">
    
    <img src="{{ url_for('static', filename='map.png') }}" 
         alt="Map Icon" 
         style="width: 32px; 
                height: 32px; 
                object-fit: contain;">
    </a>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('file-input');
            const predictBtn = document.getElementById('predict-btn');
            const modelSelector = document.getElementById('model-selector');
            const uploadArea = document.getElementById('upload-area');
            const imagePreviewContainer = document.getElementById('image-preview-container');
            const imagePreview = document.getElementById('image-preview');
            const removeImageBtn = document.getElementById('remove-image-btn');
            const resultsWrapper = document.getElementById('results-wrapper');
            const loader = document.getElementById('loader');
            const errorContainer = document.getElementById('error-container');
            const resultPrediction = document.getElementById('result-prediction');
            const resultConfidence = document.getElementById('result-confidence');
            const modelUsedDisplay = document.getElementById('model-used-display');
            const infTime = document.getElementById('inf-time');
            const allResultsList = document.getElementById('all-results-list');
            const view3dBtn = document.getElementById('view-3d-btn');
            const xaiResultImg = document.getElementById('xai-result-img');
            const shapWarning = document.getElementById('shap-warning');
            
            let currentFile = null;
            let currentGradCam = null;
            let currentShap = null;
            let currentLime = null;
            let currentPredictionRaw = null;

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    currentFile = file;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        imagePreview.src = event.target.result;
                        imagePreviewContainer.style.display = 'block';
                        uploadArea.style.display = 'none';
                        predictBtn.disabled = false;
                        resultsWrapper.style.display = 'none';
                    };
                    reader.readAsDataURL(file);
                }
            });

            removeImageBtn.addEventListener('click', () => {
                fileInput.value = '';
                currentFile = null;
                imagePreviewContainer.style.display = 'none';
                uploadArea.style.display = 'flex';
                predictBtn.disabled = true;
                resultsWrapper.style.display = 'none';
                
                // Keep PDF button hidden when image is removed
                const pdfBtn = document.getElementById('download-pdf-btn');
                if (pdfBtn) pdfBtn.style.display = 'none';
            });

            predictBtn.addEventListener('click', async () => {
                if (!currentFile) return;
                const formData = new FormData();
                formData.append('file', currentFile);
                formData.append('model_type', modelSelector.value);

                loader.style.display = 'block';
                predictBtn.disabled = true;
                resultsWrapper.style.display = 'none';
                errorContainer.style.display = 'none';

                try {
                    const response = await fetch('/predict', { method: 'POST', body: formData });
                    const data = await response.json();
                    if (response.ok) {
                        displayResult(data);
                    } else {
                        errorContainer.textContent = data.error || 'Error';
                        errorContainer.style.display = 'block';
                    }
                } catch (err) {
                    errorContainer.textContent = 'Connection Failed';
                    errorContainer.style.display = 'block';
                } finally {
                    loader.style.display = 'none';
                    predictBtn.disabled = false;
                }
            });

            view3dBtn.addEventListener('click', () => {
                if(currentPredictionRaw) window.open(`viewer_3d.html?focus=${currentPredictionRaw}`, '_blank');
            });

            window.switchXaiTab = (type) => {
                const tabs = document.querySelectorAll('.xai-tab');
                tabs.forEach(t => t.classList.remove('active'));
                
                shapWarning.style.display = 'none';
                xaiResultImg.style.display = 'block';

                let targetImage = null;

                if (type === 'gradcam') {
                    tabs[0].classList.add('active');
                    targetImage = currentGradCam;
                } else if (type === 'lime') {
                    tabs[1].classList.add('active');
                    targetImage = currentLime;
                } else if (type === 'shap') {
                    tabs[2].classList.add('active');
                    targetImage = currentShap;
                }
                
                if (targetImage) {
                    xaiResultImg.src = `data:image/png;base64,${targetImage}`;
                } else {
                    xaiResultImg.style.display = 'none';
                    shapWarning.style.display = 'block';
                    shapWarning.textContent = `${type.toUpperCase()} image could not be generated.`;
                }
            };

            function displayResult(data) {
                resultPrediction.textContent = data.top_prediction;
                resultConfidence.textContent = data.top_confidence;
                modelUsedDisplay.textContent = data.model_used;
                infTime.textContent = data.inference_time;
                currentPredictionRaw = data.top_prediction_raw;

                currentGradCam = data.gradcam;
                currentShap = data.shap;
                currentLime = data.lime;
                
                switchXaiTab('gradcam');
                
                allResultsList.innerHTML = '';
                data.all_predictions.forEach(pred => {
                    const li = document.createElement('li');
                    li.classList.add('barchart-item');
                    li.innerHTML = `<span class="barchart-label">${pred.class_name}</span>
                                    <div class="barchart-bar-container">
                                        <div class="barchart-bar-fill" style="width: ${pred.confidence}%"></div>
                                        <span class="barchart-value">${pred.confidence}%</span>
                                    </div>`;
                    allResultsList.appendChild(li);
                window.pdfImages = {
                    gradcam: data.gradcam,
                    lime: data.lime,
                    shap: data.shap
                };
                });

                resultsWrapper.style.display = 'block';
                view3dBtn.style.display = 'block';
                
                // CHANGE 4: Show the PDF button when results arrive
                const pdfBtn = document.getElementById('download-pdf-btn');
                if (pdfBtn) pdfBtn.style.display = 'block';
                
                if(window.setSphereState) window.setSphereState(data.health_status);
            }
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('3d-canvas');
            const loader3d = document.getElementById('loader-3d');
            const container = document.querySelector('.left-column');
            let model, reactiveMaterials = []; 
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 5;
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.autoRotate = true;
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dl = new THREE.DirectionalLight(0xffffff, 1); dl.position.set(5,10,7); scene.add(dl);
            
            new THREE.GLTFLoader().load("{{ url_for('static', filename='model/scene.gltf') }}", (gltf) => {
                model = gltf.scene;
                model.traverse((n) => { if(n.isMesh && n.material) reactiveMaterials.push({material:n.material, originalColor:n.material.color.clone(), originalEmissive:n.material.emissive.clone()}); });
                const box = new THREE.Box3().setFromObject(model);
                const s = box.getSize(new THREE.Vector3()).length();
                model.scale.set(5.0/s, 5.0/s, 5.0/s);
                scene.add(model);
                loader3d.style.display = 'none';
            });
            function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
            animate();
            window.setSphereState = (status) => {
                if(!model) return;
                gsap.killTweensOf(reactiveMaterials.map(m=>m.material.emissive));
                reactiveMaterials.forEach(m => {
                    if(status==='healthy') { gsap.to(m.material.color, {r:0.1,g:1,b:0.1}); gsap.to(m.material.emissive, {r:0,g:0.3,b:0}); }
                    else if(status==='abnormal') { gsap.to(m.material.color, {r:1,g:0.1,b:0.1}); gsap.to(m.material.emissive, {r:0.5,g:0,b:0, yoyo:true, repeat:-1}); }
                    else { gsap.to(m.material.color, {r:m.originalColor.r, g:m.originalColor.g, b:m.originalColor.b}); gsap.to(m.material.emissive, {r:m.originalEmissive.r, g:m.originalEmissive.g, b:m.originalEmissive.b}); }
                });
            };
        });
    </script>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
